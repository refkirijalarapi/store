<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refki Store - Katalog</title>
    <style>
        :root {
            --pink-soft: #fce4ec;
            --pink-bold: #f06292;
            --dark-blue: #2c3e50;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #fafafa; color: var(--dark-blue); }

        header { background: var(--white); padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-weight: bold; color: var(--pink-bold); font-size: 1.5rem; letter-spacing: 2px; }

        .container { max-width: 600px; margin: 20px auto; padding: 15px; }
        .shop-info { text-align: center; margin-bottom: 30px; }
        .shop-info p { font-size: 0.9rem; color: #777; margin-top: 5px; }

        /* Product Card Style ala Lynk.id */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .product-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            border: 1px solid #eee;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; aspect-ratio: 1/1; background: #eee; object-fit: cover; }
        .product-detail { padding: 12px; }
        .product-title { font-size: 0.85rem; font-weight: 600; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
        .price-now { color: var(--pink-bold); font-weight: bold; font-size: 1rem; }
        .price-was { font-size: 0.75rem; text-decoration: line-through; color: #aaa; margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Refki Store</div>
</header>

<div class="container">

    <div class="product-grid">
        <a href="tabungan.html" class="product-card">
            <img src="foto1.jpg" class="product-img" alt="Produk">
            <div class="product-detail">
                <div class="product-title">Catatan tabungan bareng pasangan</div>
                <div class="price-now">Rp 50.000</div>
                <div class="price-was">Rp 150.000</div>
            </div>
        </a>
        
        <div class="product-card" style="opacity: 0.5;">
            <div class="product-img" style="display:flex; align-items:center; justify-content:center;">Coming Soon</div>
            <div class="product-detail">
                <div class="product-title">Wedding Planner Spreadsheet</div>
                <div class="price-now">Rp 25.000</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
